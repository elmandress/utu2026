<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesej.css">
    <title>01 - Card</title>
</head>
<body>
    <header>
        <h1>&#174;Pokédex</h1>
    </header>
    <main class="main-container">
        <div class="card">
            <h3 class="card-tittle">&#174;Pikachu</h3>
            <figure>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" alt="Picachu">
                <figcaption>Tipo: Eléctrico</figcaption>
                <p>Es el Pokémon más conocido de la historia, mayormente por ser el acompañante del protagonista del anime, Ash Ketchum</p>
            </figure>
            <a href="https://pokemon.fandom.com/es/wiki/Pikachu" target="_self">Más información</a>       
         </div>
         <div class="card">
            <h3 class="card-tittle">&#174;Magmortar</h3>
            <figure>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/467.png" alt="Magmortar">
                <figcaption>Tipo: Fuego</figcaption>
                <p>Magmortar es un Pokémon de tipo fuego introducido en la cuarta generación. Es la evolución de Magmar.</p>
            </figure>
            <a href="https://pokemon.fandom.com/es/wiki/Magmortar" target="_self">Más información</a>       
         </div>
         <div class="card">
            <h3 class="card-tittle">&#174;Lopunny</h3>
            <figure>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/428.png" alt="Lopunny">
                <figcaption>Tipo: Normal</figcaption>
                <p>Lopunny es un Pokémon tipo normal introducido en la cuarta generación. Es la forma evolucionada de Buneary.</p>
            </figure>
            <a href="https://pokemon.fandom.com/es/wiki/Lopunny" target="_self">Más información</a>       
         </div>
         <div class="card">
            <h3 class="card-tittle">&#174;Cherubi</h3>
            <figure>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/420.png" alt="Cherubi">
                <figcaption>Tipo: Planta</figcaption>
                <p>Cherubi es un Pokémon de tipo planta introducido en la cuarta generación.</p>
            </figure>
            <a href="https://pokemon.fandom.com/es/wiki/Cherubi" target="_self">Más información</a>       
         </div>
         <div class="card">
            <h3 class="card-tittle">&#174;Machoke</h3>
            <figure>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/67.png" alt="Machoke">
                <figcaption>Tipo: Lucha</figcaption>
                <p>Machoke es un Pokémon de tipo lucha introducido en la primera generación. Es la evolución de Machop.</p>
            </figure>
            <a href="https://pokemon.fandom.com/es/wiki/Machoke" target="_self">Más información</a>       
         </div>
         <div class="card">
            <h3 class="card-tittle">&#174;Garchomp</h3>
            <figure>
                <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/445.png" alt="Garchomp">
                <figcaption>Tipo: Dragon/Tierra</figcaption>
                <p>Garchomp es un Pokémon de tipo dragón/tierra introducido en la cuarta generación. Es la forma evolucionada de Gabite</p>
            </figure>
            <a href="https://pokemon.fandom.com/es/wiki/Garchomp" target="_self">Más información</a>       
         </div>
    </main>
    <footer>
        <p>Esto esta hecho por &#174;Luciano Maciel, Matias Rossello, Agustin Alfonso, Guillermo Raffetto</p>
    </footer>
</body>
</html>
